# ========== 服务器配置 ==========
server:
  port: 8080 # 应用运行端口，默认 8080

# ========== Spring Boot 核心配置 ==========
spring:
  # ---------- 数据源配置 ----------
  datasource:
    # MySQL 数据库连接地址：localhost 本机，3306 端口，数据库名为 yunming_tea
    # useUnicode=true 启用 Unicode 编码
    # characterEncoding=utf-8 指定 UTF-8 字符集
    # serverTimezone=Asia/Shanghai 设置时区为东八区
    # useSSL=false 关闭 SSL（本地开发环境）
    # allowPublicKeyRetrieval=true 允许客户端获取公钥
    url: jdbc:mysql://localhost:3306/yunming_tea?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root # 数据库用户名
    password: ty302415.v # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL JDBC 驱动类名（cj 表示 MySQL 8.x Connector/J）

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  # ---------- MyBatis 核心配置 ----------
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名转换：数据库字段 user_name → Java 属性 userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL 日志输出到标准输出（控制台），方便开发调试
  # ---------- 全局配置 ----------
  global-config:
    db-config:
      id-type: auto # 主键生成策略：auto 表示由数据库自增
      logic-delete-field: deleted # 逻辑删除字段名，MyBatis-Plus 会自动处理逻辑删除
      logic-delete-value: 1 # 已删除的值：deleted=1 表示已删除
      logic-not-delete-value: 0 # 未删除的值：deleted=0 表示未删除
  mapper-locations: classpath:mapper/*.xml # Mapper XML 文件路径（本项目中主要使用注解方式，保留此配置用于扩展）
  type-aliases-package: com.yunming.tea.entity # 实体类别名包路径，Mapper XML 中可直接使用类名

# ========== JWT 认证配置 ==========
jwt:
  secret: yunming-tea-system-jwt-secret-key-2024-spring-boot-auth # JWT 签名密钥，生产环境需使用更复杂的密钥并做好保密
  expiration: 86400000 # Token 过期时间，单位毫秒（86400000ms = 24小时）
